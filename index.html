<style>
:root{
  --bg:#FBEFE1;
  --bg-soft:#F3E1CB;
  --surface:#FFFFFF;
  --primary:#A85C2E;
  --primary-deep:#7C4220;
  --primary-mist:#F3DFC9;
  --rose:#C97B5A;
  --rose-deep:#A15A3D;
  --gold:#C99A4E;
  --gold-soft:#F3E6C9;
  --text:#3A2A1E;
  --text-soft:#8A7361;
  --border:#E8D5BE;
  --danger:#C4604F;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:10px;
  --shadow:0 8px 24px rgba(124,66,32,0.10);
  --shadow-sm:0 2px 8px rgba(124,66,32,0.08);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(circle at 20% -10%, #F7E4CE 0%, var(--bg) 45%);
  color:var(--text);
  font-family:'Noto Sans Hebrew','Rubik',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
}
h1,h2,h3,.display{font-family:'Rubik',sans-serif; font-weight:700; letter-spacing:-0.01em;}
button{font-family:inherit; cursor:pointer;}
#app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  position:relative;
  box-shadow:0 0 60px rgba(0,0,0,0.06);
}

/* ---------- HEADER ---------- */
header.top{
  position:relative;
  padding:22px 20px 40px;
  background:linear-gradient(155deg, var(--primary-deep) 0%, var(--primary) 60%, #C17F4E 100%);
  color:#fff;
  border-radius:0 0 32px 32px;
  overflow:hidden;
}
header.top::before{
  content:"";
  position:absolute;
  top:-60px; left:-40px;
  width:200px; height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);
}
header.top::after{
  content:"";
  position:absolute;
  bottom:-80px; right:-60px;
  width:220px; height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
}
.header-row{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:56px; height:56px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.85);
  overflow:hidden; flex-shrink:0; background:#FBEFE1;
  display:flex; align-items:center; justify-content:center;
}
.brand-mark img{width:100%; height:100%; object-fit:contain;}
.brand h1{font-size:19px; margin:0; color:#fff;}
.brand p{margin:1px 0 0; font-size:11.5px; color:rgba(255,255,255,0.75); font-weight:500;}
.weather-pill{
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:999px;
  padding:6px 12px 6px 8px;
  font-size:12.5px;
  backdrop-filter:blur(6px);
  min-width:88px;
  justify-content:center;
}
.weather-pill .wicon{font-size:16px;}
.weather-pill .wtemp{font-weight:700; font-family:'Rubik',sans-serif;}
.header-sub{margin-top:18px; position:relative; z-index:1; display:flex; justify-content:space-between; align-items:flex-end;}
.header-sub .greet{font-size:13px; color:rgba(255,255,255,0.8); font-weight:500;}
.header-sub .date-big{font-family:'Rubik',sans-serif; font-size:22px; font-weight:700; margin-top:2px;}
.weather-inline{
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:16px;
  padding:8px 14px;
  backdrop-filter:blur(6px);
}
.weather-inline .wicon{font-size:26px; line-height:1;}
.weather-inline .wtemp{font-family:'Rubik',sans-serif; font-size:20px; font-weight:700; line-height:1;}
.weather-inline .wdesc{font-size:11px; color:rgba(255,255,255,0.8); font-weight:500; line-height:1.2;}

/* ---------- MAIN / TABS ---------- */
main{flex:1; padding:18px 16px 100px;}
.section-title{font-size:15px; font-weight:700; margin:4px 2px 12px; display:flex; align-items:center; justify-content:space-between;}
.section-title .hint{font-size:11.5px; color:var(--text-soft); font-weight:500;}

.card{
  background:var(--surface);
  border-radius:var(--radius-md);
  padding:14px 16px;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
}
.stack{display:flex; flex-direction:column; gap:10px;}

/* buttons */
.btn{
  border:none; border-radius:999px; padding:10px 16px;
  font-size:13.5px; font-weight:600; display:inline-flex; align-items:center; gap:6px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--primary); color:#fff; box-shadow:0 4px 12px rgba(39,79,71,0.25);}
.btn-ghost{background:var(--primary-mist); color:var(--primary-deep);}
.btn-rose{background:var(--rose); color:#fff;}
.btn-gold{background:var(--gold-soft); color:#8a6a25;}
.btn-danger{background:#F7E4E0; color:var(--danger);}
.btn-sm{padding:7px 12px; font-size:12px;}
.btn-icon{width:34px; height:34px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; background:var(--primary-mist); color:var(--primary-deep); font-size:16px;}
.fab{
  position:fixed; bottom:92px; left:20px;
  width:54px; height:54px; border-radius:50%;
  background:var(--rose); color:#fff; border:none;
  box-shadow:0 10px 20px rgba(169,88,106,0.35);
  font-size:26px; display:flex; align-items:center; justify-content:center;
  z-index:20;
}
.fab-wrap{position:absolute; max-width:480px; width:100%; left:50%; transform:translateX(-50%); pointer-events:none;}
.fab-wrap .fab{pointer-events:auto;}

/* ---------- CALENDAR ---------- */
.cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.cal-nav .month-label{font-family:'Rubik',sans-serif; font-weight:700; font-size:16px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.cal-dow{text-align:center; font-size:11px; color:var(--text-soft); font-weight:600; padding-bottom:4px;}
.cal-cell{
  aspect-ratio:1; border-radius:12px; background:var(--surface); border:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  font-size:12.5px; position:relative; color:var(--text);
}
.cal-cell.muted{opacity:0.35;}
.cal-cell.has-lesson{background:rgba(201,123,90,0.22); border:2px solid var(--rose);}
.cal-cell.today{border:2px solid var(--gold); font-weight:700;}
.cal-cell.selected{background:var(--primary); color:#fff; border-color:var(--primary);}
.cal-cell .dots{display:flex; gap:2px;}
.cal-cell .dot{width:5px; height:5px; border-radius:50%; background:var(--rose);}
.cal-cell.selected .dot{background:#fff;}
.cal-cell .hflag{position:absolute; top:3px; left:4px; font-size:9px; line-height:1;}
.cal-cell .rflag{position:absolute; top:3px; right:4px; font-size:9px; line-height:1;}

.cal-legend{
  display:flex; flex-wrap:wrap; gap:10px 14px; margin-top:14px; padding-top:12px;
  border-top:1px solid var(--border);
}
.legend-item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-soft);}
.legend-box{width:14px; height:14px; border-radius:5px; display:inline-block; flex-shrink:0; background:var(--surface); border:1.5px solid var(--border);}
.legend-lesson{background:rgba(201,123,90,0.22); border:2px solid var(--rose);}
.legend-today{border:2px solid var(--gold);}
.legend-selected{background:var(--primary); border-color:var(--primary);}

.holiday-pill{
  font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:var(--radius-sm);
  margin-bottom:8px; display:inline-block;
}
.holiday-pill.t-holiday{background:var(--gold-soft); color:#8a6a25;}
.holiday-pill.t-fast{background:#F3E3E0; color:#8f4636;}
.holiday-pill.t-memorial{background:#EEECE7; color:#5c584c;}
.holiday-pill.t-note{background:var(--primary-mist); color:var(--primary-deep); font-weight:600;}

.day-panel{margin-top:16px;}
.day-panel-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.repeat-hint{
  font-size:11.5px; color:var(--primary-deep); background:var(--primary-mist); padding:6px 10px;
  border-radius:var(--radius-sm); margin-bottom:8px; display:inline-block;
}
.empty{
  text-align:center; padding:26px 14px; color:var(--text-soft); font-size:13px;
  border:1.5px dashed var(--border); border-radius:var(--radius-md); background:rgba(255,255,255,0.4);
}

/* lesson / list items */
.item{
  background:var(--surface); border-radius:var(--radius-md); padding:12px 14px;
  border:1px solid var(--border); display:flex; flex-direction:column; gap:8px;
}
.item-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.item-title{font-weight:700; font-size:14.5px;}
.item-meta{font-size:12px; color:var(--text-soft); margin-top:2px;}
.badge{
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px;
  background:var(--primary-mist); color:var(--primary-deep); white-space:nowrap;
}
.item-actions{display:flex; gap:6px; flex-wrap:wrap;}
.item-actions .btn{padding:6px 11px; font-size:11.5px;}
.money{unicode-bidi:embed; direction:ltr; display:inline-block;}

/* forms */
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px;}
.field label{font-size:12px; font-weight:600; color:var(--text-soft);}
.field input, .field select, .field textarea{
  border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px;
  font-size:14px; font-family:inherit; background:#fff; color:var(--text);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--primary);}
.row-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

.scroll-picker-wrap{position:relative;}
.scroll-picker{
  height:168px; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch;
  border:1.5px solid var(--border); border-radius:var(--radius-sm); background:#fff;
}
.scroll-picker-item{
  height:42px; display:flex; align-items:center; justify-content:center;
  scroll-snap-align:center; font-size:14px; color:var(--text-soft);
}
.scroll-picker-item.picked{font-weight:700; color:var(--primary-deep); font-size:16.5px;}
.scroll-picker-highlight{
  position:absolute; top:50%; left:6px; right:6px; height:42px; transform:translateY(-50%);
  border-top:1.5px solid var(--primary); border-bottom:1.5px solid var(--primary);
  border-radius:6px; pointer-events:none; background:rgba(168,92,46,0.06);
}

.search-box{margin-bottom:14px;}
.search-box input{
  width:100%; border:1.5px solid var(--border); border-radius:999px; padding:10px 16px;
  font-size:13.5px; background:#fff;
}

/* modal */
.overlay{
  position:fixed; inset:0; background:rgba(20,35,32,0.45); z-index:50;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s ease;
}
.overlay.open{opacity:1; pointer-events:auto;}
.login-gate{
  position:fixed; inset:0; z-index:200; background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.login-card{
  width:100%; max-width:360px; background:var(--surface); border-radius:22px;
  padding:32px 24px; box-shadow:0 10px 30px rgba(60,35,20,0.12); text-align:center;
}
.login-card img{width:64px; height:64px; border-radius:16px; margin-bottom:14px;}
.login-title{font-weight:800; font-size:18px; color:var(--text); margin-bottom:2px;}
.login-sub{font-size:13px; color:var(--text-soft); margin-bottom:20px;}
.login-card input{
  width:100%; box-sizing:border-box; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
  font-size:15px; margin-bottom:12px; background:var(--bg); text-align:center; direction:ltr;
}
.login-card .btn{width:100%; justify-content:center;}
.login-error{color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px;}
.modal{
  width:100%; max-width:480px; background:var(--bg);
  border-radius:26px 26px 0 0; padding:20px 20px 26px; max-height:88vh; overflow-y:auto;
  transform:translateY(30px); transition:transform .25s ease;
}
.overlay.open .modal{transform:translateY(0);}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.modal-head h3{margin:0; font-size:17px;}
.close-x{background:none; border:none; font-size:20px; color:var(--text-soft); width:32px; height:32px;}
.modal-actions{display:flex; gap:10px; margin-top:6px;}
.modal-actions .btn{flex:1; justify-content:center;}

/* trips */
.trip-summary{display:flex; gap:10px; margin-bottom:14px;}
.trip-summary .card{flex:1; text-align:center; padding:14px 8px;}
.trip-summary .big{font-family:'Rubik',sans-serif; font-size:20px; font-weight:800; color:var(--primary-deep);}
.trip-summary .lbl{font-size:11px; color:var(--text-soft); margin-top:2px;}

/* bottom nav */
nav.bottom{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:#fff; border-top:1px solid var(--border);
  display:flex; padding:8px 6px 10px; z-index:30;
  box-shadow:0 -6px 20px rgba(39,79,71,0.06);
}
nav.bottom button{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--text-soft); font-size:10.5px; font-weight:600; padding:6px 0; border-radius:12px;
}
nav.bottom button.active{color:var(--primary-deep);}
nav.bottom .ic{font-size:19px;}
nav.bottom button.active .ic{filter:none;}

/* misc */
.chip-row{display:flex; gap:6px; flex-wrap:wrap;}
.tiny{font-size:11px; color:var(--text-soft);}
a.link-plain{color:var(--primary-deep); text-decoration:none; font-weight:600;}
::-webkit-scrollbar{width:0;height:0;}
@keyframes confetti-fall{
  0%{ transform:translate(0,0) rotate(0deg); opacity:0.95; }
  100%{ transform:translate(var(--drift), 105vh) rotate(var(--rotate)); opacity:0.3; }
}
</style>

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function triggerConfetti(){
  const colors = ['#A85C2E','#C97B5A','#CC9F4E','#7C4220','#E8A87C'];
  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.inset = '0';
  container.style.pointerEvents = 'none';
  container.style.zIndex = '999';
  container.style.overflow = 'hidden';
  document.body.appendChild(container);
  const count = 60;
  for(let i=0; i<count; i++){
    const piece = document.createElement('span');
    const size = 6 + Math.random()*6;
    const isCircle = Math.random() > 0.5;
    piece.style.position = 'absolute';
    piece.style.top = '-20px';
    piece.style.left = Math.random()*100 + 'vw';
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.borderRadius = isCircle ? '50%' : '2px';
    piece.style.opacity = '0.95';
    const duration = 1.6 + Math.random()*1.2;
    const delay = Math.random()*0.3;
    const drift = (Math.random()*140 - 70) + 'px';
    const rotate = (Math.random()*720 - 360) + 'deg';
    piece.style.animation = `confetti-fall ${duration}s ${delay}s ease-in forwards`;
    piece.style.setProperty('--drift', drift);
    piece.style.setProperty('--rotate', rotate);
    container.appendChild(piece);
  }
  setTimeout(()=>{ container.remove(); }, 3200);
}
function pad(n){ return n.toString().padStart(2,'0'); }
function fmtSentTime(ts){

}

function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function classifyHoliday(name){
  if(/^(ראש השנה|יום כיפור|סוכות$|שמחת תורה|פסח$|שביעי של פסח|שבועות$|יום העצמאות)/.test(name)) return 'holiday';
  if(/^(צום|תענית|שבעה עשר בתמוז|תשעה באב)/.test(name)) return 'fast';
  if(/^(יום הזיכרון|יום העלייה|יום הרצל|יום הניצחון|יום ז'בוטינסקי|יום רבין|יום בן-גוריון)/.test(name)) return 'memorial';
  return 'note';
}
const HOLIDAYS_BY_DATE = {};
HOLIDAYS_RAW.forEach(([date,name])=>{
  const type = classifyHoliday(name);
  const rank = {holiday:3, fast:2, memorial:1, note:0};
  const existing = HOLIDAYS_BY_DATE[date];
  if(!existing || rank[type] > rank[existing.type]){
    HOLIDAYS_BY_DATE[date] = {name, type, names:[name]};
  } else {
    existing.names.push(name);
  }
  if(existing && existing.names.indexOf(name)===-1 && rank[type] <= rank[existing.type]){
    existing.names.push(name);
  }
});

/* ---------------------------------------------------------
   STORAGE (standard browser IndexedDB — works on any website,
   including GitHub Pages, not just inside Claude's preview)
--------------------------------------------------------- */
const DB_NAME = 'pilatesStudioDB';
const DB_STORE = 'kv';
let _dbPromise = null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject)=>{
    if(!('indexedDB' in window)){ reject(new Error('IndexedDB not supported')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return _dbPromise;
}
async function loadKey(key, fallback){
  try{
    const db = await openDB();
    const value = await new Promise((resolve, reject)=>{
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
    if(value!==undefined && value!==null) return JSON.parse(value);
    return fallback;
  }catch(e){
    try{
      const raw = localStorage.getItem(key);
      return raw!=null ? JSON.parse(raw) : fallback;
    }catch(e2){ return fallback; }
  }
}
async function saveKey(key, value){
  try{
    const db = await openDB();
    await new Promise((resolve, reject)=>{
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(JSON.stringify(value), key);
      tx.oncomplete = ()=> resolve();
      tx.onerror = ()=> reject(tx.error);
    });
  }catch(e){
    console.error('שגיאת שמירה', key, e);
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e2){}
  }
}

function normalizePhone(p){ return (p||'').replace(/\D/g,''); }

function showLoginGate(){
  const gate = document.getElementById('loginGate');
  const logoSrc = (document.querySelector('.brand-mark img')||{}).src || '';
  gate.innerHTML = `
    <div class="login-card">
      ${logoSrc?`<img src="${logoSrc}" alt="">`:''}
      <div class="login-title">Zohar Pilates</div>
      <div class="login-sub">הזינו את מספר הטלפון שלכם כדי להיכנס</div>

    </div>
  `;
  gate.style.display = 'flex';
  const input = document.getElementById('loginPhoneInput');
  const errorEl = document.getElementById('loginErrorMsg');
  const trySubmit = async ()=>{
    const entered = normalizePhone(input.value);
    if(!entered){ errorEl.textContent = 'נא להזין מספר טלפון'; return; }
    const match = loginPhones.some(p=> normalizePhone(p.phone)===entered);
    if(match){
      await saveKey('pilates_login_state', {phone: entered, version: APP_VERSION});
      gate.style.display = 'none';
      gate.innerHTML = '';
    } else {
      errorEl.textContent = 'מספר לא מזוהה כמורשה לכניסה';
      input.value = '';
      input.focus();
    }
  };
  document.getElementById('loginSubmitBtn').onclick = trySubmit;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') trySubmit(); });
  setTimeout(()=> input.focus(), 50);
}

--------------------------------------------------------- */
async function exportBackup(){
  const data = {
    appBackup: 'zohar-pilates-studio',
    version: 1,
    exportedAt: new Date().toISOString(),
    clients,
    lessons,
    remindersEnabled,
    reminded: Array.from(reminded),
    sentSummaries,
    authorizedPhones,
  };
  const json = JSON.stringify(data, null, 2);
  const today = new Date();
  const fname = `pilates-backup-${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}.json`;

  try{
    const file = new File([json], fname, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'גיבוי אפליקציית פילאטיס'});
      return;
    }
  }catch(e){
    if(e && e.name === 'AbortError') return; // user cancelled the share sheet — don't also download
  }

  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 3000);
}

function telHref(phone){

function waHref(phone, text){
  let p = (phone||'').replace(/[^\d]/g,'');
  if(p.startsWith('0')) p = '972'+p.slice(1);
  else if(!p.startsWith('972')) p = '972'+p;

}

}

/* Navigate to a lesson's location in Waze, and auto-calculate and save the round-trip
   km using the phone's current location as the origin.
   IMPORTANT: the km calculation + save must happen BEFORE opening Waze — once Waze opens
   (app-switch or new tab), the page can be backgrounded/suspended by the OS, which kills
   any pending network requests. Opening Waze first was the bug that caused km to never save. */
async function navigateToLessonAndCalcKm(lessonId){
  const l = lessons.find(x=>x.id===lessonId);
  if(!l) return;
  const c = clientById(l.clientId);
  const destAddress = l.location || (c ? c.address : '') || '';
  if(!destAddress){
    alert('אין כתובת יעד לשיעור זה (לא הוגדר מקום השיעור ואין כתובת שמורה ללקוח/ה)');
    return;
  }

  const btn = document.querySelector(`[data-nav-lesson="${lessonId}"]`);
  const originalText = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = '📍 מחשב מרחק...'; }

  if(navigator.geolocation){
    try{
      const pos = await new Promise((resolve,reject)=> navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:8000}));
      const fromAddress = await reverseGeocodeAddress(pos.coords.latitude, pos.coords.longitude);
      if(fromAddress){
        const km = await estimateRoundTripKm(fromAddress, destAddress);
        if(km!=null){
          l.from = fromAddress;
          l.km = km;
          await persist.lessons();
        }
      }
    }catch(e){
      // best effort — proceed to navigation regardless of whether km calc succeeded
    }
  }

  if(btn){ btn.disabled = false; btn.textContent = originalText; }
  renderMain();
  // Open Waze LAST, after the km save has completed
  window.open(wazeHref(destAddress), '_blank');
}
function gcalHref(l){
  const c = clientById(l.clientId);
  const name = c ? c.name : 'לקוח/ה';
  const title = encodeURIComponent(`שיעור פילאטיס — ${name}`);
  const start = new Date(`${l.date}T${l.time}:00`);
  const dur = Number(l.duration||45);
  const end = new Date(start.getTime() + dur*60000);
  const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const dates = `${fmt(start)}/${fmt(end)}`;
  const details = encodeURIComponent(l.notes || '');
  const loc = l.location || (c ? c.address : '') || '';
  const location = encodeURIComponent(loc);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${location}&ctz=Asia/Jerusalem`;
}

--------------------------------------------------------- */
async function estimateTravelMinutes(destAddress){
  if(!destAddress) return null;
  try{
    const pos = await new Promise((resolve,reject)=>{
      if(!navigator.geolocation) return reject('no-geo');
      navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:6000, maximumAge:120000});
    });
    const oLat = pos.coords.latitude, oLon = pos.coords.longitude;
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(destAddress)}`);
    const geoData = await geoRes.json();
    if(!geoData || !geoData[0]) return null;
    const dLat = parseFloat(geoData[0].lat), dLon = parseFloat(geoData[0].lon);
    const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${oLon},${oLat};${dLon},${dLat}?overview=false`);
    const routeData = await routeRes.json();
    if(!routeData.routes || !routeData.routes[0]) return null;
    return Math.round(routeData.routes[0].duration/60);
  }catch(e){
    return null;
  }
}
async function reverseGeocodeAddress(lat, lon){
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data = await res.json();
    return (data && data.display_name) ? data.display_name : null;
  }catch(e){ return null; }
}
async function estimateRoundTripKm(fromAddress, toAddress){
  if(!fromAddress || !toAddress) return null;
  try{
    const [fromGeoRes, toGeoRes] = await Promise.all([
      fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(fromAddress)}`),
      fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(toAddress)}`),
    ]);
    const [fromGeo, toGeo] = await Promise.all([fromGeoRes.json(), toGeoRes.json()]);
    if(!fromGeo || !fromGeo[0] || !toGeo || !toGeo[0]) return null;
    const oLat = parseFloat(fromGeo[0].lat), oLon = parseFloat(fromGeo[0].lon);
    const dLat = parseFloat(toGeo[0].lat), dLon = parseFloat(toGeo[0].lon);
    const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${oLon},${oLat};${dLon},${dLat}?overview=false`);
    const routeData = await routeRes.json();
    if(!routeData.routes || !routeData.routes[0]) return null;
    const oneWayKm = routeData.routes[0].distance/1000;
    return Math.round(oneWayKm*2*10)/10;
  }catch(e){
    return null;
  }
}
async function checkReminders(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const now = new Date();
  let changed = false;
  for(const l of lessons){
    if(reminded.has(l.id)) continue;
    if(!l.date || !l.time) continue;
    const dt = new Date(`${l.date}T${l.time}:00`);
    const diffMin = (dt - now)/60000;
    if(diffMin<=60 && diffMin>57){
      const c = clientById(l.clientId);
      const name = c ? c.name : 'לקוח/ה';
      const dest = l.location || (c ? c.address : '') || '';
      const travelMin = await estimateTravelMinutes(dest);
      let body = `לקוח/ה: ${name}\nשעת השיעור: ${l.time}`;
      if(dest){
        body += travelMin!=null
          ? `\nזמן הגעה משוער מהמיקום הנוכחי: כ-${travelMin} דק'`
          : `\nיעד: ${dest} (לא ניתן היה לחשב זמן הגעה)`;
      }
      try{
        new Notification('תזכורת שיעור פילאטיס 🧘', { body });
      }catch(e){}
      reminded.add(l.id);
      changed = true;
    }
  }
  if(changed) persist.reminded();
}
function startReminderChecks(){
  checkReminders();
  setInterval(checkReminders, 30000);
}
async function enableReminders(){
  if(!('Notification' in window)){ alert('הדפדפן הזה לא תומך בהתראות.'); return; }
  const perm = await Notification.requestPermission();
  if(perm==='granted'){
    remindersEnabled = true;
    await persist.remindersEnabled();
    if(navigator.geolocation){
      try{ navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {timeout:6000}); }catch(e){}
    }
    startReminderChecks();
    renderMain();
  } else {
    alert('לא ניתנה הרשאה להתראות. אפשר לאשר בהגדרות הדפדפן ולנסות שוב.');
  }
}

function calendarTabHTML(){
  const y = calViewDate.getFullYear(), m = calViewDate.getMonth();
  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrevMonth = new Date(y,m,0).getDate();

  let cells = '';
  for(let i=0;i<startOffset;i++){
    const dnum = daysInPrevMonth - startOffset + i + 1;
    cells += `<div class="cal-cell muted">${dnum}</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const dt = new Date(y,m,d);
    const key = dateKey(dt);
    const dayLessons = lessons.filter(l=>l.date===key);
    const isToday = key===todayKey();
    const isSel = key===selectedDayKey;
    const isLessonDay = dayLessons.length>0;
    const hasRecurring = dayLessons.some(l=>l.seriesId);
    const dots = dayLessons.slice(0,3).map(()=>'<span class="dot"></span>').join('');
    const hol = getHoliday(key);
    const holClass = hol ? `hol-${hol.type}` : '';
    const holIcons = {holiday:'🎉', fast:'✡️', memorial:'🕯️', note:'✨'};
    const hflag = hol ? `<span class="hflag">${holIcons[hol.type]}</span>` : '';
    const rflag = hasRecurring ? `<span class="rflag" title="שיעור חוזר">🔁</span>` : '';
    cells += `<div class="cal-cell ${isToday?'today':''} ${isSel?'selected':''} ${isLessonDay?'has-lesson':''} ${holClass}" data-day="${key}" title="${hol?hol.names.join(', '):''}">
      ${hflag}${rflag}<div>${d}</div><div class="dots">${dots}</div>
    </div>`;
  }
  const totalCells = startOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let i=1;i<=trailing;i++) cells += `<div class="cal-cell muted">${i}</div>`;

  const dow = HE_DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  return `
    <div class="cal-nav">
      <button class="btn-icon" id="prevMonth">‹</button>
      <div class="month-label">${HE_MONTHS[m]} ${y}</div>
      <button class="btn-icon" id="nextMonth">›</button>
    </div>
    <div class="cal-grid">${dow}${cells}</div>
    <div class="cal-legend">
      <div class="legend-item"><span class="legend-box legend-lesson"></span>יום עם שיעור</div>
      <div class="legend-item"><span class="legend-box legend-today"></span>היום</div>
      <div class="legend-item"><span class="legend-box legend-selected"></span>יום נבחר</div>
      <div class="legend-item">🔁 שיעור חוזר</div>
      <div class="legend-item">🎉 חג</div>
      <div class="legend-item">✡️ יום צום</div>
      <div class="legend-item">🕯️ יום ציון</div>
      <div class="legend-item">✨ מועד</div>
    </div>
    <div class="day-panel" id="dayPanel">${selectedDayKey ? dayPanelHTML(selectedDayKey) : ''}</div>
  `;
}

function monthKeyStr(y,m){ return `${y}-${pad(m+1)}`; }
function dashboardTabHTML(){
  const y = dashViewDate.getFullYear(), m = dashViewDate.getMonth();
  const mk = monthKeyStr(y,m);
  const monthLessons = lessons.filter(l=>l.date && l.date.startsWith(mk));
  const totalMinutes = monthLessons.reduce((s,l)=>s+Number(l.duration||0),0);
  const totalHours = totalMinutes/60;

  const totalKm = monthLessons.reduce((s,l)=>s+Number(l.km||0),0);

  const byClient = {};
  monthLessons.forEach(l=>{
    const cid = l.clientId || '_none';
    if(!byClient[cid]) byClient[cid] = {minutes:0, count:0};
    byClient[cid].minutes += Number(l.duration||0);
    byClient[cid].count += 1;
  });
  let totalRevenue = 0, missingRateCount = 0;
  const rows = Object.entries(byClient).map(([cid, data])=>{
    const c = cid!=='_none' ? clientById(cid) : null;
    const hours = data.minutes/60;
    const rate = c && c.rate ? Number(c.rate) : 0;
    const subtotal = rate ? hours*rate : 0;
    if(rate) totalRevenue += subtotal; else missingRateCount += data.count;
    const sentAt = c ? sentSummaries[`${c.id}_${mk}`] : null;
    return {clientId: c?c.id:null, name: c ? c.name : 'ללא לקוח/ה משויך/ת', count:data.count, hours, rate, subtotal, sentAt};
  }).sort((a,b)=>b.subtotal-a.subtotal);

  const rowsHtml = rows.length ? rows.map(r=>`
    <div class="item">
      <div class="item-top">
        <div>
          <div class="item-title">${r.name}</div>
          <div class="item-meta">${r.count} שיעורים · ${r.hours.toFixed(1)} שעות${r.rate?(' · '+fmtMoney(r.rate)+' לשעה'):' · אין תעריף מוגדר'}</div>
        </div>
        <span class="badge">${r.rate ? fmtMoney(r.subtotal) : '—'}</span>
      </div>
      ${r.clientId ? `<div class="item-actions">
        <button class="btn btn-ghost btn-sm" data-edit-client="${r.clientId}">✏️ ${r.rate?'עריכת תעריף':'הגדרת תעריף'}</button>
        <button class="btn ${r.sentAt?'btn-ghost':'btn-rose'} btn-sm" data-send-summary="${r.clientId}">💬 ${r.sentAt?'שליחה חוזרת':'שליחת סיכום'}</button>
      </div>
      ${r.sentAt ? `<div class="tiny" style="color:#2e7d32; margin-top:4px;">✓ נשלח ב-${fmtSentTime(r.sentAt)}</div>` : ''}` : ''}
    </div>`).join('') : `<div class="empty">אין שיעורים מתוזמנים החודש עדיין.<br>עברו ל"לוח שנה" כדי להוסיף.</div>`;

  return `
    <div class="section-title">סיכום חודשי</div>
    <div class="cal-nav" style="margin-bottom:14px;">
      <button class="btn-icon" id="dashPrevMonth">‹</button>
      <div class="month-label">${HE_MONTHS[m]} ${y}</div>
      <button class="btn-icon" id="dashNextMonth">›</button>
    </div>
    <div class="trip-summary">
      <div class="card"><div class="big">${totalHours.toFixed(1)}</div><div class="lbl">שעות</div></div>
      <div class="card"><div class="big">${totalKm.toFixed(0)}</div><div class="lbl">ק״מ</div></div>
      <div class="card"><div class="big">${fmtMoney(totalRevenue)}</div><div class="lbl">הכנסה משוערת</div></div>
    </div>
    ${missingRateCount ? `<div class="tiny" style="margin-bottom:10px;">${missingRateCount} שיעורים לא נכללו בסכום כי לא הוגדר תעריף לשעה. אפשר להגדיר תעריף בכרטיס הלקוח/ה למטה או בלשונית "לקוחות".</div>` : ''}
    <div class="section-title" style="margin-top:4px;">פירוט לפי לקוח/ה</div>
    <div class="stack">${rowsHtml}</div>
  `;
}

function getClientMonthStats(clientId, y, m){
  const mk = monthKeyStr(y,m);
  const ls = lessons.filter(l=>l.clientId===clientId && l.date && l.date.startsWith(mk));
  const minutes = ls.reduce((s,l)=>s+Number(l.duration||0),0);
  return {count: ls.length, hours: minutes/60};
}

function openSummaryModal(clientId){
  const c = clientById(clientId);
  if(!c) return;
  const y = dashViewDate.getFullYear(), m = dashViewDate.getMonth();
  const mk = monthKeyStr(y,m);
  const sentKey = `${c.id}_${mk}`;
  const stats = getClientMonthStats(clientId, y, m);
  const rate = c.rate ? Number(c.rate) : 0;
  const subtotal = rate * stats.hours;
  const alreadySentAt = sentSummaries[sentKey];

  const clientLessons = lessons
    .filter(l=>l.clientId===clientId && l.date && l.date.startsWith(mk))
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date));

  const isManualValue = v => v === '' || v === '__other__';
  const phoneOptions = [];
  phoneOptions.push({value: c.phone || '', label: `טלפון הלקוח/ה${c.phone ? ' ('+c.phone+')' : ' (לא הוגדר טלפון — יש להזין ידנית)'}`});
  authorizedPhones.forEach(p=> phoneOptions.push({value:p.phone, label:`${p.label?p.label+' ':''}(${p.phone})`}));
  phoneOptions.push({value:'__other__', label:'מספר אחר (הזנה ידנית)'});
  const defaultIsOther = isManualValue(phoneOptions[0].value);

  openModal(`
    <div class="modal-head"><h3>שליחת סיכום חודשי</h3><button class="close-x" id="modalClose">✕</button></div>
    <div class="field"><label>תוספת (אופציונלי — לדוגמה: נסיעות, ציוד)</label><input id="f_extraDesc" placeholder="תיאור התוספת"></div>
    <div class="field"><label>סכום תוספת (₪)</label><input id="f_extraAmount" type="number" step="1" placeholder="0"></div>
    <div class="field">
      <label>שליחה למספר</label>
      <select id="f_phone_select">
        ${phoneOptions.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}
      </select>
      <input id="f_phone_manual" type="tel" inputmode="tel" placeholder="05X-XXXXXXX" style="margin-top:8px; ${defaultIsOther?'':'display:none;'}">
    </div>
    <div class="field"><label>הסיכום שיישלח (ניתן לערוך)</label><textarea id="f_preview" rows="12"></textarea></div>
    <div id="sentStatus" class="tiny" style="color:#2e7d32; margin-bottom:8px; ${alreadySentAt?'':'display:none;'}">✓ נשלח ב-${fmtSentTime(alreadySentAt)}</div>
    <div class="modal-actions">
      <button class="btn btn-rose" id="sendBtn">💬 שליחה בוואטסאפ</button>
    </div>
  `);
  document.getElementById('modalClose').onclick = closeModal;

  const phoneSelectEl = document.getElementById('f_phone_select');
  const phoneManualEl = document.getElementById('f_phone_manual');
  phoneSelectEl.onchange = ()=>{
    const isOther = isManualValue(phoneSelectEl.value);
    phoneManualEl.style.display = isOther ? '' : 'none';
    if(isOther) phoneManualEl.focus();
  };

  const buildMessage = ()=>{
    const extraDesc = document.getElementById('f_extraDesc').value.trim();
    const extraAmount = Number(document.getElementById('f_extraAmount').value) || 0;
    const total = subtotal + extraAmount;
    const lessonLines = clientLessons.map(l=>{
      const d = new Date(l.date+'T00:00:00');
      const dow = HE_DOW_FULL[d.getDay()];
      const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
      const hrs = Number(l.duration||0)/60;
      return `${dow}, ${dateStr} — ${hrs.toFixed(1)} שעות`;
    }).join('\n');
    let text = `שלום ${c.name},\nסיכום ${HE_MONTHS[m]} ${y}:\n\n`;
    text += lessonLines || 'אין שיעורים מתועדים החודש';
    text += `\n\nסה"כ: ${stats.count} שיעורים · ${stats.hours.toFixed(1)} שעות`;
    if(rate) text += `\nתעריף: ${fmtMoneyText(rate)} לשעה`;
    text += `\nסכום: ${fmtMoneyText(subtotal)}`;
    if(extraAmount) text += `\n${extraDesc || 'תוספת'}: ${fmtMoneyText(extraAmount)}`;
    text += `\n\nלתשלום: ${fmtMoneyText(total)}\n\nתודה! 🙏`;
    document.getElementById('f_preview').value = text;
  };
  buildMessage();
  document.getElementById('f_extraDesc').addEventListener('input', buildMessage);
  document.getElementById('f_extraAmount').addEventListener('input', buildMessage);

  document.getElementById('sendBtn').onclick = ()=>{
    const isOther = isManualValue(phoneSelectEl.value);
    const phone = (isOther ? phoneManualEl.value : phoneSelectEl.value).trim();
    const text = document.getElementById('f_preview').value;
    if(!phone){ alert('נא להזין מספר טלפון לשליחה'); if(isOther) phoneManualEl.focus(); return; }
    window.open(waHref(phone, text), '_blank');

    sentSummaries[sentKey] = Date.now();
    persist.sentSummaries();

    const btn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('sentStatus');
    if(statusEl){
      statusEl.textContent = `✓ נשלח ב-${fmtSentTime(sentSummaries[sentKey])}`;
      statusEl.style.display = '';
    }
    if(btn){
      const original = btn.textContent;
      btn.textContent = '✓ נשלח!';
      setTimeout(()=>{ btn.textContent = original; }, 2000);
    }
    renderMain();
  };
}

function addDaysStr(dateStr, days){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return dateKey(d);
}
function addMonthsStr(dateStr, months){
  const d = new Date(dateStr+'T00:00:00');
  d.setMonth(d.getMonth()+months);
  return dateKey(d);
}
function buildTimeSlots(){
  const slots = [];
  for(let h=6; h<=22; h++){
    for(let mm=0; mm<60; mm+=15){
      if(h===22 && mm>0) break;
      slots.push(`${pad(h)}:${pad(mm)}`);
    }
  }
  return slots;
}
function buildDateSlots(){
  const slots = [];
  const start = new Date(); start.setDate(start.getDate()-30);
  for(let i=0;i<330;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    slots.push(dateKey(d));
  }
  return slots;
}
function dateSlotLabel(ds){
  const d = new Date(ds+'T00:00:00');
  const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
  const yd = new Date(); yd.setDate(yd.getDate()-1);
  let prefix = '';
  if(ds===todayKey()) prefix = 'היום · ';
  else if(ds===dateKey(tmr)) prefix = 'מחר · ';
  else if(ds===dateKey(yd)) prefix = 'אתמול · ';
  return `${prefix}${HE_DOW[d.getDay()]}׳ ${d.getDate()} ב${HE_MONTHS[d.getMonth()]}`;
}
function scrollPickerHTML(id, values, labels){
  const items = values.map((v,i)=>`<div class="scroll-picker-item" data-value="${v}">${labels[i]}</div>`).join('');
  return `<div class="scroll-picker-wrap">
    <div class="scroll-picker" id="${id}">${items}</div>
    <div class="scroll-picker-highlight"></div>
  </div>`;
}
function initScrollPicker(id, selectedValue, onChange){
  const el = document.getElementById(id);
  if(!el) return;
  const items = Array.from(el.querySelectorAll('.scroll-picker-item'));
  if(!items.length) return;
  const itemH = items[0].offsetHeight || 42;
  const containerH = el.clientHeight;
  const padTop = Math.max(0, (containerH - itemH)/2);
  el.style.paddingTop = padTop+'px';
  el.style.paddingBottom = padTop+'px';
  let selIdx = items.findIndex(it=>it.dataset.value===String(selectedValue));
  if(selIdx<0) selIdx = 0;
  el.scrollTop = selIdx*itemH;
  const updatePicked = (silent)=>{
    const centerY = el.scrollTop + containerH/2;
    let closestIdx=0, closestDist=Infinity;
    items.forEach((it,i)=>{
      const itemCenter = padTop + i*itemH + itemH/2;
      const dist = Math.abs(itemCenter-centerY);
      if(dist<closestDist){ closestDist=dist; closestIdx=i; }
    });
    items.forEach((it,i)=> it.classList.toggle('picked', i===closestIdx));
    if(!silent && onChange) onChange(items[closestIdx].dataset.value);
    return closestIdx;
  };
  updatePicked(true);
  let scrollTimer;
  el.addEventListener('scroll', ()=>{
    updatePicked(true);
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(()=>{
      const idx = updatePicked(false);
      el.scrollTo({top: idx*itemH, behavior:'smooth'});
    }, 130);
  });
}

          <div id="f_km_status" style="font-size:11px;color:var(--text-soft);margin-top:4px;"></div>
        </div>
      </div>
    </details>
    ${!id ? `
    <details style="margin-bottom:14px;">
      <summary style="cursor:pointer;color:var(--text-soft);font-size:12.5px;font-weight:700;padding:4px 0;">＋ חזרה על השיעור (אופציונלי)</summary>
      <div style="margin-top:10px;">
        <div class="field"><label>תדירות</label>
          <select id="f_repeat">
            <option value="none">ללא חזרה — שיעור בודד</option>
            <option value="weekly">כל שבוע</option>
            <option value="biweekly">כל שבועיים</option>
            <option value="monthly">כל חודש</option>
          </select>
        </div>
        <div class="field"><label>חזור עד תאריך</label><input type="date" id="f_repeatUntil"></div>
      </div>
    </details>` : ''}
    <div class="modal-actions">
      ${id?`<button class="btn btn-danger" id="delBtn">${TRASH_ICON} מחיקה</button>`:''}
      <button class="btn btn-primary" id="saveBtn">שמירה</button>
    </div>
    ${(id && isSeries) ? `<button class="btn btn-danger" id="delSeriesBtn" style="width:100%; justify-content:center; margin-top:10px;">${TRASH_ICON} מחיקת השיעור הזה וכל החזרות הבאות</button>` : ''}
  `);

  let pickedDate = l.date;
  let pickedTime = l.time || '09:00';
  let pickedClientId = l.clientId || '';

  initScrollPicker('f_date_picker', pickedDate, v=> pickedDate=v);
  initScrollPicker('f_time_picker', pickedTime, v=> pickedTime=v);
  initScrollPicker('f_client_picker', pickedClientId, v=> pickedClientId=v);

  document.getElementById('modalClose').onclick = closeModal;

  document.getElementById('f_from_geo').onclick = async ()=>{
    const btn = document.getElementById('f_from_geo');
    const statusEl = document.getElementById('f_from_status');
    if(!navigator.geolocation){ if(statusEl) statusEl.textContent = 'הדפדפן לא תומך במיקום'; return; }
    btn.disabled = true;
    if(statusEl) statusEl.textContent = 'מאתר מיקום נוכחי...';
    try{
      const pos = await new Promise((resolve,reject)=> navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:8000}));
      const addr = await reverseGeocodeAddress(pos.coords.latitude, pos.coords.longitude);
      if(addr){
        document.getElementById('f_from').value = addr;
        if(statusEl) statusEl.textContent = '';
      } else if(statusEl){
        statusEl.textContent = 'לא הצלחתי לזהות כתובת מדויקת, נא להזין ידנית';
      }
    }catch(e){
      if(statusEl) statusEl.textContent = 'לא ניתן היה לאתר מיקום';
    }finally{
      btn.disabled = false;
    }
  };

  document.getElementById('f_km_calc').onclick = async ()=>{
    const btn = document.getElementById('f_km_calc');
    const statusEl = document.getElementById('f_km_status');
    const from = document.getElementById('f_from').value.trim();
    const c = clientById(pickedClientId);
    const dest = (document.getElementById('f_location').value.trim()) || (c ? (c.address||'').trim() : '');
    if(!from){ if(statusEl) statusEl.textContent = 'נא להזין קודם כתובת מוצא (או ללחוץ על 📍)'; return; }
    if(!dest){ if(statusEl) statusEl.textContent = 'אין כתובת יעד (מקום השיעור או כתובת הלקוח/ה)'; return; }
    btn.disabled = true;
    if(statusEl) statusEl.textContent = 'מחשב מרחק...';
    const km = await estimateRoundTripKm(from, dest);
    if(km!=null){
      document.getElementById('f_km').value = km;
      if(statusEl) statusEl.textContent = '';
    } else if(statusEl){
      statusEl.textContent = 'לא הצלחתי לחשב מרחק, נא להזין ידנית';
    }
    btn.disabled = false;
  };

  const openNewClientFromLesson = ()=>{
    const draft = {
      date: pickedDate,
      time: pickedTime,
      duration: document.getElementById('f_duration').value,
      clientId: '',
      location: document.getElementById('f_location').value,
      notes: document.getElementById('f_notes').value,
      from: document.getElementById('f_from').value,
      km: document.getElementById('f_km').value,
    };
    openClientModal(null, (newClient)=>{
      openLessonModal(draft.date, id, {...draft, clientId:newClient.id});
    });
  };
  document.getElementById('addClientBtn').onclick = openNewClientFromLesson;
  document.getElementById('saveBtn').onclick = ()=>{
    const base = {
      date: pickedDate,
      time: pickedTime,
      duration: document.getElementById('f_duration').value,
      clientId: pickedClientId,
      location: document.getElementById('f_location').value.trim(),
      notes: document.getElementById('f_notes').value.trim(),
      from: document.getElementById('f_from').value.trim(),
      km: document.getElementById('f_km').value,
    };
    if(!base.date || !base.time){ alert('נא לבחור תאריך ושעה'); return; }

    if(id){
      const data = {...base, id, seriesId: l.seriesId};
      lessons = lessons.map(x=>x.id===id?data:x);
    } else {
      const repeatEl = document.getElementById('f_repeat');
      const repeat = repeatEl ? repeatEl.value : 'none';
      const repeatUntilEl = document.getElementById('f_repeatUntil');
      const repeatUntil = repeatUntilEl ? repeatUntilEl.value : '';
      if(repeat!=='none' && repeatUntil && repeatUntil >= base.date){
        const seriesId = uid();
        let cur = base.date;
        let safety = 0;
        while(cur <= repeatUntil && safety < 200){
          lessons.push({...base, id: uid(), date: cur, seriesId});
          safety++;
          if(repeat==='weekly') cur = addDaysStr(cur,7);
          else if(repeat==='biweekly') cur = addDaysStr(cur,14);
          else if(repeat==='monthly') cur = addMonthsStr(cur,1);
        }
      } else {
        lessons.push({...base, id: uid()});
      }
    }
    persist.lessons();
    selectedDayKey = base.date;
    closeModal();
    renderMain();
    triggerConfetti();
  };
  if(id){
    document.getElementById('delBtn').onclick = ()=>{
      openConfirmModal('למחוק שיעור זה?', ()=>{
        lessons = lessons.filter(x=>x.id!==id);
        persist.lessons();
        renderMain();
      });
    };
    if(isSeries){
      document.getElementById('delSeriesBtn').onclick = ()=>{
        openConfirmModal('למחוק את השיעור הזה ואת כל החזרות הבאות שלו (מתאריך זה ואילך)?', ()=>{
          lessons = lessons.filter(x=> !(x.seriesId===l.seriesId && x.date >= l.date));
          persist.lessons();
          renderMain();
        });
      };
    }
  }
}

/* ---------------------------------------------------------
   EVENT WIRING (delegated per render)
--------------------------------------------------------- */
function attachTabEvents(){
  if(currentTab==='dashboard'){
    const prevM = document.getElementById('dashPrevMonth');
    const nextM = document.getElementById('dashNextMonth');
    if(prevM) prevM.onclick = ()=>{ dashViewDate.setMonth(dashViewDate.getMonth()-1); renderMain(); };
    if(nextM) nextM.onclick = ()=>{ dashViewDate.setMonth(dashViewDate.getMonth()+1); renderMain(); };
    document.querySelectorAll('[data-edit-client]').forEach(b=> b.onclick = ()=> openClientModal(b.dataset.editClient));
    document.querySelectorAll('[data-send-summary]').forEach(b=> b.onclick = ()=> openSummaryModal(b.dataset.sendSummary));
  }
  if(currentTab==='settings'){
    const remindBtn = document.getElementById('enableRemindersBtn');
    if(remindBtn) remindBtn.onclick = enableReminders;
    const authBtn = document.getElementById('manageAuthPhonesBtn');
    if(authBtn) authBtn.onclick = openAuthorizedPhonesModal;
    const loginPhonesBtn = document.getElementById('manageLoginPhonesBtn');
    if(loginPhonesBtn) loginPhonesBtn.onclick = openLoginPhonesModal;
    const exportBtn = document.getElementById('exportBackupBtn');
    if(exportBtn) exportBtn.onclick = exportBackup;
    const importBtn = document.getElementById('importBackupBtn');
    const importInput = document.getElementById('importBackupInput');
    if(importBtn && importInput) importBtn.onclick = ()=> importInput.click();
    if(importInput) importInput.onchange = ()=>{
      const file = importInput.files && importInput.files[0];
      importBackupFromFile(file).finally(()=>{ importInput.value = ''; });
    };
  }
  if(currentTab==='calendar'){
    const prev = document.getElementById('prevMonth');
    const next = document.getElementById('nextMonth');
    if(prev) prev.onclick = ()=>{ calViewDate.setMonth(calViewDate.getMonth()-1); renderMain(); };
    if(next) next.onclick = ()=>{ calViewDate.setMonth(calViewDate.getMonth()+1); renderMain(); };
    document.querySelectorAll('.cal-cell[data-day]').forEach(cell=>{
      cell.onclick = ()=>{ selectedDayKey = cell.dataset.day; renderMain(); };
    });
    document.querySelectorAll('[data-add-lesson]').forEach(b=> b.onclick = ()=> openLessonModal(b.dataset.addLesson));
    document.querySelectorAll('[data-edit-lesson]').forEach(b=> b.onclick = ()=> openLessonModal(null, b.dataset.editLesson));
    document.querySelectorAll('[data-nav-lesson]').forEach(b=> b.onclick = ()=> navigateToLessonAndCalcKm(b.dataset.navLesson));
    document.querySelectorAll('[data-del-lesson]').forEach(b=> b.onclick = ()=>{
      openConfirmModal('למחוק שיעור זה?', ()=>{
        lessons = lessons.filter(x=>x.id!==b.dataset.delLesson);
        persist.lessons(); renderMain();
      });
    });
  }
  if(currentTab==='clients'){
    const addBtn = document.getElementById('addClientTopBtn');
    if(addBtn) addBtn.onclick = ()=> openClientModal();
    const search = document.getElementById('clientSearchInput');
    if(search) search.oninput = (e)=>{ clientSearch = e.target.value; renderMain(); search.focus(); };
    document.querySelectorAll('[data-edit-client]').forEach(b=> b.onclick = ()=> openClientModal(b.dataset.editClient));
    document.querySelectorAll('[data-del-client]').forEach(b=> b.onclick = ()=>{
      openConfirmModal('למחוק לקוח/ה זו?', ()=>{
        clients = clients.filter(x=>x.id!==b.dataset.delClient);
        persist.clients(); renderMain();
      });
    });
  }
  if(currentTab==='trips'){
    const prevM = document.getElementById('tripsPrevMonth');
    const nextM = document.getElementById('tripsNextMonth');
    if(prevM) prevM.onclick = ()=>{ tripsViewDate.setMonth(tripsViewDate.getMonth()-1); renderMain(); };
    if(nextM) nextM.onclick = ()=>{ tripsViewDate.setMonth(tripsViewDate.getMonth()+1); renderMain(); };
    document.querySelectorAll('[data-edit-lesson]').forEach(b=> b.onclick = ()=> openLessonModal(null, b.dataset.editLesson));
  }
}

/* ---------------------------------------------------------
   INIT
--------------------------------------------------------- */
async function init(){
  renderHeaderDate();
  initWeather();
  await loadAll();
  await checkLoginGate();
  selectedDayKey = todayKey();
  renderMain();
  if(remindersEnabled && 'Notification' in window && Notification.permission==='granted'){
    startReminderChecks();
  }
}
init();
</script>
